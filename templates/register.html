{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 40px auto; width: 100%;">
    <div class="logo-title" style="text-align: center; margin-bottom: 24px; font-size: 28px;">Create Account</div>
    <p class="muted" style="text-align: center;">Register for Pala Cloud Hub.</p>
    
    {% if error %}
    <p style="color: var(--danger); text-align: center; font-weight: 500;">{{ error }}</p>
    {% endif %}
    
    <form method="POST" action="/register" class="stack">
        <input type="text" name="username" placeholder="Choose a Username" required>
        <input type="password" name="password" placeholder="Choose a Password" required>
        <button type="submit" style="margin-top: 8px;">Create Account</button>
    </form>
    
    <p style="text-align: center; margin-top: 24px; font-size: 14px; color: var(--text-muted);">
        Already have an account? <a href="/login" style="color: var(--primary); font-weight: 500;">Login here</a>
    </p>
</div>
{% endblock %}
