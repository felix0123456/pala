{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width: 800px; margin: 0 auto; line-height: 1.6;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <h1 style="margin: 0; font-size: 24px;">{{ book.title }}</h1>
        <a href="/library" class="button secondary">Back to Library</a>
    </div>
    <div style="background: rgba(0,0,0,0.2); padding: 24px; border-radius: 8px; font-family: monospace; white-space: pre-wrap; overflow-x: auto; max-height: 70vh; overflow-y: auto;">
{{ content }}
    </div>
</div>
{% endblock %}
