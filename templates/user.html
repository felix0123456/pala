{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2>User Profile</h2>
    <p class="muted">Manage your account and preferences.</p>
    
    <div class="stack" style="margin-bottom: 24px;">
        <div style="font-size: 14px; color: var(--text-muted);">Logged in as</div>
        <div style="font-size: 24px; font-weight: 600;">{{ user.username }}</div>
    </div>
    
    <div class="stack">
        {% if getattr(user, 'is_admin', False) %}
        <a href="/admin" class="nav-btn" style="text-align: center; justify-content: center; background: rgba(255,255,255,0.05); border: 1px solid var(--border);">
            &#9881; Admin Dashboard
        </a>
        {% endif %}
        
        <a href="/logout" class="nav-btn" style="text-align: center; justify-content: center; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); color: #fca5a5;">
            Logout
        </a>
    </div>
</div>
{% endblock %}
