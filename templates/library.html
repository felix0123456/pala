{% extends "base.html" %}

{% block content %}
<div class="grid-2" style="margin-bottom: 24px;">
    <!-- Fetcher -->
    <div class="card">
        <h2>Automated Fetcher</h2>
        <p class="muted">Search across libraries to instantly download a book.</p>
        <div style="display: flex; gap: 12px; margin-bottom: 12px;">
            <input type="text" id="book-title" placeholder="Title" style="flex: 1;">
            <input type="text" id="book-author" placeholder="Author" style="flex: 1;">
            <button onclick="searchBooks()" style="width: auto;">Search</button>
        </div>
        <p id="search-status" style="color: var(--primary); font-weight: 500; font-size: 14px; margin-bottom: 12px;"></p>
        <div id="search-results" style="display: flex; flex-direction: column; gap: 12px;"></div>
    </div>

    <!-- Uploader -->
    <div class="card">
        <h2>Upload Book</h2>
        <p class="muted">Upload a .txt book manually to your cloud library.</p>
        <form action="/api/upload_book" method="POST" enctype="multipart/form-data" id="upload-book-form">
            <div style="display: flex; gap: 12px; align-items: center;">
                <input type="file" name="file" accept=".txt" required style="flex-grow: 1;">
                <button type="submit" style="width: auto;">Upload</button>
            </div>
        </form>
        <p id="upload-status" style="color: var(--success); margin-top: 16px; font-weight: 500; display: none;">Upload complete!</p>
    </div>
</div>

<div class="card" style="padding: 0; display: flex; min-height: 500px;">
    <!-- Sidebar -->
    <div style="width: 250px; background: rgba(0,0,0,0.2); padding: 16px; border-right: 1px solid var(--border); border-top-left-radius: 12px; border-bottom-left-radius: 12px;">
        <h3 style="margin-top: 0;">Folders</h3>
        <ul id="folder-list" style="list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 8px;">
        </ul>
    </div>
    
    <!-- Content Area -->
    <div style="flex-grow: 1; padding: 24px; position: relative;">
        <h2 id="current-folder-title" style="margin-top: 0;">Root</h2>
        <div id="book-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px;">
        </div>
    </div>
</div>

<script>
    const books = [
        {% for book in books %}
        {
            id: {{ book.id }},
            title: "{{ book.title|escape }}",
            folder: "{{ book.folder|escape }}",
            bookmarks: [
                {% for bm in book.bookmarks %}
                { device: "{{ bm.device.name|escape }}", page: {{ bm.page_index }} }{% if not loop.last %},{% endif %}
                {% endfor %}
            ]
        }{% if not loop.last %},{% endif %}
        {% endfor %}
    ];

    let currentFolder = "Root";

    function renderLibrary() {
        // Extract unique folders
        const folders = new Set();
        books.forEach(b => folders.add(b.folder || "Root"));
        folders.add("Root"); // Ensure Root always exists
        
        const folderArr = Array.from(folders).sort();

        // Render Sidebar
        const folderList = document.getElementById('folder-list');
        folderList.innerHTML = '';
        folderArr.forEach(folder => {
            const li = document.createElement('li');
            li.style = `padding: 8px 12px; border-radius: 6px; cursor: pointer; transition: 0.2s; background: ${folder === currentFolder ? 'var(--primary)' : 'transparent'}; font-weight: ${folder === currentFolder ? '600' : '400'}; color: ${folder === currentFolder ? '#000' : 'var(--text)'};`;
            li.onclick = () => { currentFolder = folder; renderLibrary(); };
            li.innerText = folder;
            folderList.appendChild(li);
        });

        // Render Grid
        const grid = document.getElementById('book-grid');
        grid.innerHTML = '';
        document.getElementById('current-folder-title').innerText = currentFolder;
        
        const filteredBooks = books.filter(b => (b.folder || "Root") === currentFolder);

        if (filteredBooks.length === 0) {
            grid.innerHTML = `<p class="muted" style="grid-column: 1 / -1;">No books in this folder.</p>`;
            return;
        }

        filteredBooks.forEach(book => {
            const card = document.createElement('div');
            card.style = "background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 8px; padding: 16px; display: flex; flex-direction: column; position: relative;";
            
            let bmText = "Not read yet";
            if (book.bookmarks.length > 0) {
                const latestBm = book.bookmarks[0]; // simplistic approach
                bmText = `Page ${latestBm.page} (${latestBm.device})`;
            }

            // Create context menu overlay for move/delete
            const otherFolders = folderArr.filter(f => f !== book.folder);

            card.innerHTML = `
                <div style="font-weight: 600; font-size: 15px; margin-bottom: 8px; flex-grow: 1; word-break: break-word;">${book.title}</div>
                <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 12px; display: flex; align-items: center; gap: 4px;">
                    <span>&#128214;</span> ${bmText}
                </div>
                
                <div style="display: flex; gap: 8px; margin-top: auto;">
                    <button class="secondary" style="flex: 1; padding: 4px; font-size: 12px;" onclick="promptMove(${book.id}, '${book.title}')">Move</button>
                    <button class="danger" style="flex: 1; padding: 4px; font-size: 12px;" onclick="deleteBook(${book.id})">Delete</button>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    async function promptMove(bookId, title) {
        const newFolder = prompt(`Move '${title}' to folder: (leave empty for Root, or type a new folder name)`);
        if (newFolder !== null) {
            const folder = newFolder.trim() || "Root";
            try {
                let formData = new FormData();
                formData.append("folder", folder);
                const res = await fetch(`/api/book/${bookId}/move`, { method: 'PUT', body: formData });
                if (res.ok) {
                    window.location.reload();
                } else {
                    alert("Failed to move book");
                }
            } catch (e) {
                alert("Error moving book");
            }
        }
    }

    async function deleteBook(bookId) {
        if (confirm("Are you sure you want to delete this book? This will remove it from all devices upon next sync.")) {
            try {
                const res = await fetch(`/api/book/${bookId}`, { method: 'DELETE' });
                if (res.ok) {
                    window.location.reload();
                } else {
                    alert("Failed to delete book");
                }
            } catch (e) {
                alert("Error deleting book");
            }
        }
    }

    // Initialize UI
    renderLibrary();

    // ----------------------------------------------------
    // Fetcher & Uploader logic (unchanged functionality)
    // ----------------------------------------------------
    async function searchBooks() {
        const title = document.getElementById('book-title').value.trim();
        const author = document.getElementById('book-author').value.trim();
        if (!title && !author) return;
        const query = encodeURIComponent(title + (author ? ' ' + author : ''));
        const status = document.getElementById('search-status');
        const resultsDiv = document.getElementById('search-results');
        
        status.innerText = "Searching Project Gutenberg and OpenLibrary...";
        resultsDiv.innerHTML = "";

        const renderResult = (book) => {
            const el = document.createElement('div');
            el.style = "background: rgba(255,255,255,0.05); padding: 12px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center;";
            const safeBookJSON = JSON.stringify(book).replace(/'/g, "\\'").replace(/"/g, '&quot;');
            el.innerHTML = `
                <div>
                    <div style="font-weight: bold; margin-bottom: 4px;">${book.title}</div>
                    <div style="font-size: 14px; color: var(--text-muted);">${book.authors} &mdash; <i>${book.source}</i></div>
                </div>
                <button onclick="fetchSelected(${safeBookJSON})" style="padding: 8px 16px; font-size: 14px; white-space: nowrap;">Fetch</button>
            `;
            resultsDiv.appendChild(el);
        };

        fetch('/api/search/gutendex?q=' + query).then(res => res.json()).then(data => {
            if (data.results && data.results.length > 0) data.results.forEach(renderResult);
        }).catch(err => console.error(err));

        fetch('/api/search/openlibrary?q=' + query).then(res => res.json()).then(data => {
            if (data.results && data.results.length > 0) data.results.forEach(renderResult);
        }).catch(err => console.error(err));
    }

    async function fetchSelected(book) {
        const status = document.getElementById('search-status');
        status.innerText = `Fetching '${book.title}'...`;
        try {
            let res = await fetch('/api/fetch_result', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(book)
            });
            let data = await res.json();
            status.innerText = data.message || data.error;
            if(data.message) setTimeout(() => window.location.reload(), 2000);
        } catch (e) {
            status.innerText = "Error fetching book.";
        }
    }

    document.getElementById('upload-book-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const form = e.target;
        const res = await fetch(form.action, { method: 'POST', body: new FormData(form) });
        if (res.ok) {
            const status = document.getElementById('upload-status');
            status.style.display = 'block';
            setTimeout(() => { status.style.display = 'none'; window.location.reload(); }, 1500);
        }
    });
</script>
{% endblock %}
